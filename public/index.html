<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>BRP Community</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #1b1b2f, #0d0d14);
      color: white;
      overflow: hidden;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
      margin-bottom: 30px;
    }

    .btn {
      background: #5865F2;
      padding: 15px 30px;
      border-radius: 12px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.08);
      background: #4752c4;
    }

    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: #5865F2;
      filter: blur(150px);
      opacity: 0.3;
      top: 20%;
    }
  </style>
</head>
<body>

<div class="glow"></div>

<div class="container">
  <h1>BRP Community</h1>
  <p>Notruf / Roleplay Server • Aktiv • Community</p>

  <a class="btn" href="/login">Mit Discord einloggen</a>
</div>

</body>
</html>
